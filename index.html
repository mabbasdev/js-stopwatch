<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Stopwatch | Clean UI</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="stopwatch-container">
    <div class="stopwatch-content">
      <!-- time display -->
      <div class="time-panel">
        <div class="timer" id="timerDisplay">0</div>
      </div>

      <!-- control buttons -->
      <div class="action-grid">
        <button class="btn btn-primary" id="startBtn">Start</button>
        <button class="btn btn-secondary" id="pauseBtn">Pause</button>
        <button class="btn btn-warning" id="resetBtn">Reset</button>
        <button class="btn btn-outline" id="lapBtn">Lap</button>
        <button class="btn btn-danger" id="clearLapsBtn">Clear Laps</button>
      </div>

      <!-- lap history panel -->
      <div class="laps-panel">
        <div class="laps-header">
          <span class="laps-title">Lap History</span>
          <span class="laps-badge" id="lapCounter">0 laps</span>
        </div>
        <div class="laps-list-container">
          <ul class="lap-list" id="lapList">
            <li class="lap-empty">No laps recorded</li>
          </ul>
        </div>
      </div>
    </div>
  </div>
  <script src="script.js"></script>

</body>

</html>
